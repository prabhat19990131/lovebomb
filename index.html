<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mystic Tarot Oracle</title>
        <style>
        :root{--card-w:150px;--card-h:255px;--grid-cols:7;--sb-w:240px;--topbar-h:56px;--ph-bar-h:44px;--bnav-h:64px}
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%;overflow:hidden}
        body{background:#0e0120;color:#f0e8ff;font-family:'Georgia',serif;-webkit-font-smoothing:antialiased}
        .bg-glow{position:fixed;top:50%;left:50%;width:1400px;height:1400px;transform:translate(-50%,-50%);background:radial-gradient(ellipse at 30% 40%,rgba(255,80,220,.22) 0%,rgba(160,60,255,.18) 35%,rgba(60,180,255,.1) 65%,transparent 80%);animation:bg-rotate 25s linear infinite;pointer-events:none;z-index:0}
        @keyframes bg-rotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
        .portal-rings{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0}
        .ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;animation:ring-breathe 5s ease-in-out infinite}
        .ring:nth-child(1){width:160px;height:160px;animation-delay:0s;border:1.5px solid rgba(232,72,196,.18)}
        .ring:nth-child(2){width:340px;height:340px;animation-delay:.6s;border:1.5px solid rgba(168,85,247,.14)}
        .ring:nth-child(3){width:540px;height:540px;animation-delay:1.2s;border:1.5px solid rgba(99,102,241,.1)}
        .ring:nth-child(4){width:760px;height:760px;animation-delay:1.8s;border:1.5px solid rgba(6,182,212,.08)}
        .ring:nth-child(5){width:1000px;height:1000px;animation-delay:2.4s;border:1.5px solid rgba(232,72,196,.06)}
        @keyframes ring-breathe{0%,100%{opacity:.2}50%{opacity:.65}}
        #particles{position:fixed;inset:0;pointer-events:none;z-index:0}
        #app{position:relative;z-index:1;display:grid;height:100dvh;overflow:hidden;grid-template-columns:var(--sb-w) 1fr;grid-template-areas:"sidebar main"}
        #sidebar{grid-area:sidebar;display:flex;flex-direction:column;background:linear-gradient(180deg,rgba(22,4,52,.98) 0%,rgba(12,2,38,.99) 100%);border-right:1px solid rgba(255,80,220,.3);height:100dvh;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:rgba(255,80,220,.3) transparent}
        #sidebar::-webkit-scrollbar{width:3px}
        #sidebar::-webkit-scrollbar-thumb{background:rgba(232,72,196,.32);border-radius:4px}
        .sb-brand{display:flex;align-items:center;gap:.75rem;padding:1.3rem 1rem 1.1rem;border-bottom:1px solid rgba(255,80,220,.22);flex-shrink:0;background:linear-gradient(180deg,rgba(255,80,220,.12) 0%,rgba(140,60,255,.06) 60%,transparent 100%)}
        .sb-eye{font-size:1.65rem;flex-shrink:0;filter:drop-shadow(0 0 12px rgba(232,72,196,.9));animation:eye-glow 3s ease-in-out infinite}
        @keyframes eye-glow{0%,100%{filter:drop-shadow(0 0 12px rgba(232,72,196,.9))}50%{filter:drop-shadow(0 0 26px rgba(251,191,36,1))}}
        .sb-brand-title{font-size:.8rem;letter-spacing:2.5px;text-transform:uppercase;font-weight:bold;background:linear-gradient(135deg,#e879f9,#fbbf24,#34d399,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .sb-brand-sub{font-size:.43rem;color:rgba(232,180,255,.4);letter-spacing:1.8px;text-transform:uppercase;margin-top:.2rem;line-height:1.55}
        .sb-section{font-size:.44rem;letter-spacing:3px;text-transform:uppercase;color:rgba(232,180,255,.3);padding:.8rem 1rem .3rem}
        .sb-section-flush{padding-top:.1rem}
        .sb-nav{display:flex;flex-direction:column;padding:0 .6rem .5rem}
        .sb-group{margin-bottom:.15rem}
        .sb-group-btn{width:100%;display:flex;align-items:center;gap:.55rem;padding:.52rem .75rem;border:1px solid transparent;border-radius:8px;background:transparent;color:rgba(220,180,255,.52);font-family:'Georgia',serif;font-size:.7rem;text-align:left;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
        .sb-group-btn .sb-icon{font-size:.95rem;flex-shrink:0}
        .sb-group-btn .sb-btn-text{flex:1}
        .sb-group-btn .arrow{font-style:normal;font-size:.52rem;transition:transform .25s;color:rgba(220,180,255,.32)}
        .sb-group-btn.open .arrow{transform:rotate(180deg)}
        .sb-group-btn:hover{background:rgba(255,80,220,.12);border-color:rgba(255,80,220,.45);color:#ff9ef7}
        .sb-group-btn.marvel-on,.sb-group-btn.omkar-on,.sb-group-btn.classic-on,.sb-group-btn.nordic-on{background:rgba(255,80,220,.15);border-color:rgba(255,80,220,.55);color:#ff9ef7}
        .sb-submenu{overflow:hidden;max-height:0;opacity:0;transition:max-height .35s,opacity .25s;padding-left:.55rem}
        .sb-submenu.open{max-height:280px;opacity:1}
        .sb-deck-btn{width:100%;display:flex;align-items:center;gap:.5rem;padding:.42rem .7rem;border:1px solid transparent;border-radius:6px;background:transparent;color:rgba(220,180,255,.44);font-family:'Georgia',serif;font-size:.65rem;text-align:left;cursor:pointer;transition:all .2s;margin-bottom:.12rem;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
        .sb-deck-btn .sb-icon{font-size:.88rem;flex-shrink:0}
        .sb-deck-btn:hover{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.5);color:#fde68a}
        .sb-deck-btn.active{background:linear-gradient(135deg,rgba(251,191,36,.18),rgba(255,130,50,.12));border-color:#fbbf24;color:#fbbf24;font-weight:bold}
        .sb-divider{height:1px;background:rgba(232,72,196,.11);margin:.35rem .75rem;flex-shrink:0}
        .sb-stats-wrap{padding:0 .9rem .5rem}
        .sb-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin-top:.15rem}
        .sb-stat{text-align:center;padding:.6rem .3rem;background:rgba(232,72,196,.06);border:1px solid rgba(232,72,196,.15);border-radius:10px}
        .sb-stat-num{font-size:1.4rem;font-weight:bold;color:#e879f9;line-height:1}
        .sb-stat-label{font-size:.42rem;color:rgba(220,180,255,.4);letter-spacing:2px;text-transform:uppercase;margin-top:.18rem}
        .sb-actions-wrap{padding:0 .6rem}
        .sb-actions{display:flex;flex-direction:column;gap:.32rem;margin-top:.15rem}
        .sb-btn{width:100%;padding:.52rem .75rem;text-align:left;border:1px solid rgba(255,80,220,.4);background:linear-gradient(135deg,rgba(255,80,220,.12),rgba(160,60,255,.08));color:#ff9ef7;font-family:'Georgia',serif;font-size:.64rem;letter-spacing:1.2px;text-transform:uppercase;border-radius:8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.4rem;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
        .sb-btn:hover{background:linear-gradient(135deg,rgba(255,80,220,.28),rgba(160,60,255,.18));border-color:#ff50dc;color:#ffe0ff;box-shadow:0 0 14px rgba(255,80,220,.3)}
        .sb-btn:disabled{opacity:.3;cursor:default}
        .sb-btn-reset{border-color:rgba(99,102,241,.3);background:rgba(99,102,241,.06);color:rgba(165,180,252,.82)}
        .sb-btn-reset:hover{background:rgba(99,102,241,.16);border-color:#818cf8;color:#c7d2fe}
        .sb-btn-view{border-color:rgba(52,211,153,.26);background:rgba(52,211,153,.05);color:rgba(52,211,153,.82)}
        .sb-btn-view:hover{background:rgba(52,211,153,.15);border-color:#34d399;color:#6ee7b7}
        .sb-hint{font-size:.44rem;color:rgba(220,180,255,.28);letter-spacing:2px;text-transform:uppercase;text-align:center;padding:.7rem .9rem;margin-top:auto;line-height:1.9}
        .js-reveal-btn{display:none}
        #app-main{grid-area:main;display:flex;flex-direction:column;height:100dvh;overflow:hidden}
        #app-topbar{display:none}
        #app-tabbar{display:none}
        #ph-bar{display:none}
        #app-bottomnav{display:none}
        #app-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:1.5rem 1rem 2rem;scroll-behavior:smooth}
        #app-content::-webkit-scrollbar{width:5px}
        #app-content::-webkit-scrollbar-thumb{background:rgba(232,72,196,.22);border-radius:5px}
        #app-topbar{height:var(--topbar-h);flex-shrink:0;align-items:center;padding:0 1rem;gap:.75rem;background:linear-gradient(90deg,rgba(22,4,52,.98) 0%,rgba(14,2,38,.99) 100%);border-bottom:1px solid rgba(255,80,220,.28);position:relative;z-index:50}
        .tb-eye{font-size:1.35rem;flex-shrink:0;filter:drop-shadow(0 0 8px rgba(232,72,196,.85));animation:eye-glow 3s ease-in-out infinite}
        .tb-title{flex:1;font-size:.78rem;letter-spacing:2px;text-transform:uppercase;font-weight:bold;background:linear-gradient(135deg,#e879f9,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .tb-stats{display:flex;align-items:center;gap:.4rem;flex-shrink:0}
        .tb-chip{background:rgba(232,72,196,.12);border:1px solid rgba(232,72,196,.24);border-radius:20px;padding:.18rem .55rem;font-size:.56rem;color:rgba(232,72,196,.95);white-space:nowrap;font-family:'Georgia',serif}
        .tb-chip .js-revealed,.tb-chip .js-hidden{font-weight:bold;font-size:.66rem}
        .tb-chip-label{color:rgba(220,180,255,.45);font-size:.48rem;margin-left:.15rem}
        .tb-btns{display:flex;gap:.32rem;flex-shrink:0}
        .tb-icon-btn{width:2.1rem;height:2.1rem;border-radius:8px;border:1px solid rgba(232,72,196,.24);background:rgba(232,72,196,.08);color:rgba(232,72,196,.85);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
        .tb-icon-btn:hover,.tb-icon-btn:active{background:rgba(232,72,196,.24);border-color:#e879f9;color:#f0abfc}
        #app-tabbar{flex-shrink:0;flex-direction:column;background:linear-gradient(90deg,rgba(18,3,45,.98),rgba(12,2,35,.99));border-bottom:1px solid rgba(255,80,220,.22);padding:.5rem .7rem .4rem;gap:.32rem;position:relative;z-index:40}
        .tab-nav-row{display:flex;flex-wrap:wrap;align-items:flex-start;gap:.32rem}
        .tab-group{display:inline-flex;flex-direction:column}
        .tab-group-btn{display:inline-flex;align-items:center;gap:.32rem;padding:.4rem .82rem;border:1px solid rgba(220,180,255,.22);background:transparent;color:rgba(220,180,255,.55);font-family:'Georgia',serif;font-size:.65rem;letter-spacing:1px;border-radius:6px;cursor:pointer;transition:all .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
        .tab-group-btn .arrow{font-style:normal;font-size:.5rem;transition:transform .25s}
        .tab-group-btn.open .arrow{transform:rotate(180deg)}
        .tab-group-btn.marvel-on,.tab-group-btn.omkar-on,.tab-group-btn.classic-on,.tab-group-btn.nordic-on{border-color:rgba(251,191,36,.4);color:rgba(251,191,36,.88)}
        .tab-submenu{overflow:hidden;max-height:0;opacity:0;transition:max-height .35s,opacity .25s;display:flex;flex-wrap:wrap;gap:.26rem;padding-top:0}
        .tab-submenu.open{max-height:80px;opacity:1;padding-top:.28rem}
        .tab-deck-btn{padding:.34rem .68rem;border:1px solid rgba(220,180,255,.18);background:transparent;color:rgba(220,180,255,.5);font-family:'Georgia',serif;font-size:.6rem;border-radius:4px;cursor:pointer;transition:all .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
        .tab-deck-btn:hover{border-color:rgba(251,191,36,.4);color:rgba(251,191,36,.88)}
        .tab-deck-btn.active{border-color:rgba(251,191,36,.52);color:#fbbf24;background:rgba(251,191,36,.1)}
        .tab-actions{display:flex;flex-wrap:wrap;gap:.28rem;border-top:1px solid rgba(232,72,196,.1);padding-top:.38rem}
        .tab-ctrl-btn{padding:.34rem .72rem;border:1px solid rgba(232,72,196,.28);background:rgba(232,72,196,.06);color:rgba(232,72,196,.88);font-family:'Georgia',serif;font-size:.58rem;letter-spacing:1px;border-radius:4px;cursor:pointer;transition:all .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
        .tab-ctrl-btn:hover,.tab-ctrl-btn:active{background:rgba(232,72,196,.2);border-color:#e879f9;color:#f0abfc}
        #ph-bar{flex-shrink:0;height:var(--ph-bar-h);align-items:center;gap:.32rem;padding:0 .7rem;background:linear-gradient(90deg,rgba(18,3,45,.98),rgba(12,2,35,.99));border-top:1px solid rgba(255,80,220,.22);overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
        #ph-bar::-webkit-scrollbar{display:none}
        .ph-btn{flex-shrink:0;padding:.3rem .7rem;border:1px solid rgba(232,72,196,.28);background:rgba(232,72,196,.07);color:rgba(232,72,196,.88);font-family:'Georgia',serif;font-size:.58rem;letter-spacing:1px;border-radius:6px;cursor:pointer;transition:all .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
        .ph-btn:hover,.ph-btn:active{background:rgba(232,72,196,.22);border-color:#e879f9}
        #app-bottomnav{flex-shrink:0;height:var(--bnav-h);align-items:stretch;justify-content:space-around;background:linear-gradient(90deg,rgba(20,3,48,.99),rgba(10,2,32,.99));border-top:1px solid rgba(255,80,220,.28);padding:0 .4rem;padding-bottom:env(safe-area-inset-bottom,0px)}
        .bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.18rem;padding:.38rem .08rem;background:transparent;border:none;border-radius:8px;color:rgba(220,180,255,.32);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;position:relative}
        .bnav-btn:active,.bnav-btn:hover{color:#ff9ef7}
        .bnav-btn.active{color:#fbbf24}
        .bnav-btn.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:3px;border-radius:0 0 4px 4px;background:linear-gradient(90deg,#ff50dc,#fbbf24);box-shadow:0 0 12px rgba(255,80,220,.8)}
        .bnav-icon{font-size:1.1rem;line-height:1}
        .bnav-label{font-size:.36rem;letter-spacing:1px;text-transform:uppercase}
        @media(max-width:1023px){#app{grid-template-columns:1fr;grid-template-areas:"main"}#sidebar{display:none}#app-topbar{display:flex}#app-tabbar{display:flex}#app-content{padding:1rem .7rem 1.5rem}}
        @media(max-width:599px){#app-tabbar{display:none}#ph-bar{display:flex}#app-bottomnav{display:flex}#app-content{padding:.75rem .45rem .9rem}}
        .pre-deck-hidden{display:none !important}
        .hint{font-size:.5rem;color:rgba(220,180,255,.3);letter-spacing:2.5px;text-transform:uppercase;text-align:center;margin-bottom:.65rem}
        .grid{display:grid;grid-template-columns:repeat(var(--grid-cols),var(--card-w));gap:8px;justify-content:center;margin:0 auto}
        .card-wrap{perspective:1100px;width:var(--card-w);height:var(--card-h);cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
        .card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .85s cubic-bezier(0.175,0.885,0.32,1.275)}
        .card:hover:not(.flipped){transform:translateY(-10px) scale(1.07);filter:drop-shadow(0 14px 32px rgba(255,80,220,.75))}
        @media(hover:none){.card:hover:not(.flipped){transform:none;filter:none}}
        .card.flipped{transform:rotateY(180deg)}
        .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;overflow:hidden}
        .deck-stack{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;padding:2rem 0}
        .stack-pile{position:relative;width:150px;height:255px;cursor:default}
        .stack-card{position:absolute;inset:0;border-radius:10px;background:linear-gradient(135deg,#6d28d9,#a855f7,#ec4899);border:2.5px solid rgba(251,191,36,.75);box-shadow:0 6px 28px rgba(168,85,247,.55),inset 0 0 30px rgba(232,72,196,.3);display:flex;align-items:center;justify-content:center}
        .stack-card:nth-child(1){transform:rotate(-5deg) translate(-10px,8px)}
        .stack-card:nth-child(2){transform:rotate(-2.5deg) translate(-5px,4px)}
        .stack-card:nth-child(3){transform:rotate(0deg)}
        .stack-card:nth-child(4){transform:rotate(2.5deg) translate(5px,-4px)}
        .stack-card:nth-child(5){transform:rotate(5deg) translate(10px,-8px)}
        .stack-rune{font-size:1.8rem;filter:drop-shadow(0 0 12px rgba(251,191,36,1));animation:slow-spin 14s linear infinite}
        .stack-label{margin-top:1.4rem;font-size:.7rem;letter-spacing:4px;text-transform:uppercase;color:rgba(220,180,255,.6);text-align:center}
        .deck-stack.hidden{display:none}
        .face-back{background:linear-gradient(135deg,#6d28d9 0%,#a855f7 40%,#ec4899 80%,#f59e0b 100%);border:2.5px solid rgba(251,191,36,.78);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 22px rgba(168,85,247,.45),inset 0 0 30px rgba(232,72,196,.28)}
        .back-art{width:80%;height:84%;border:1.5px solid rgba(255,255,255,.3);border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative;background:rgba(255,255,255,.05)}
        .back-art::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;border-radius:50%;border:2px solid rgba(255,255,255,.4);box-shadow:0 0 18px rgba(251,191,36,.55)}
        .back-art::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:38px;height:38px;border-radius:50%;border:1.5px solid rgba(255,255,255,.5)}
        .back-rune{font-size:1.7rem;z-index:1;filter:drop-shadow(0 0 10px rgba(255,255,255,.9));animation:slow-spin 12s linear infinite}
        @keyframes slow-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        .face-front{transform:rotateY(180deg);background:linear-gradient(160deg,#ffffff 0%,#f7f0ff 55%,#fff4fb 100%);border:2.5px solid rgba(168,85,247,.55);display:flex;flex-direction:column;align-items:center;padding:.5rem .42rem .38rem;box-shadow:inset 0 0 24px rgba(200,80,255,.1)}
        .f-arcana{font-size:.52rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(109,40,217,.7);font-weight:600;margin-bottom:.04rem}
        .back-serial{position:absolute;top:.45rem;left:.5rem;z-index:3;font-size:1rem;font-weight:bold;letter-spacing:.5px;color:#fff;font-family:'Georgia',serif;background:rgba(109,40,217,.72);border-radius:5px;padding:.04rem .38rem;text-shadow:0 1px 4px rgba(0,0,0,.4);line-height:1.3}
        .f-serial{align-self:flex-start;font-size:.88rem;font-weight:bold;letter-spacing:.5px;color:#fff;font-family:'Georgia',serif;background:linear-gradient(135deg,#7c3aed,#a855f7);border:1.5px solid rgba(168,85,247,.6);border-radius:6px;padding:.03rem .38rem;text-shadow:0 1px 3px rgba(0,0,0,.3);margin-bottom:.05rem;line-height:1.25}
        .f-symbol{font-size:2.4rem;margin:.12rem 0;animation:sym-breathe 2.5s ease-in-out infinite}
        @keyframes sym-breathe{0%,100%{transform:scale(1);filter:drop-shadow(0 0 8px currentColor)}50%{transform:scale(1.12);filter:drop-shadow(0 0 22px currentColor)}}
        .f-tarot-name{font-size:.5rem;letter-spacing:1px;text-transform:uppercase;color:rgba(109,40,217,.65);text-align:center;margin-bottom:.08rem}
        .f-marvel-name{font-size:.72rem;font-weight:900;color:#1a0040;text-align:center;line-height:1.2;margin:.1rem 0 .14rem;text-shadow:0 1px 0 rgba(255,255,255,.8)}
        .f-line{width:82%;height:1.5px;margin:.14rem 0;background:linear-gradient(to right,transparent,rgba(168,85,247,.6),transparent)}
        .f-keyword{font-size:.48rem;letter-spacing:1px;text-transform:uppercase;font-weight:700;color:#6d28d9;text-align:center;margin-bottom:.1rem;opacity:.85}
        .f-yesno{font-size:.66rem;font-weight:bold;letter-spacing:2px;padding:.2rem .55rem;border-radius:50px;margin:.1rem 0 .12rem}
        .f-yesno.yes{background:rgba(16,185,129,.18);border:2px solid #10b981;color:#047857}
        .f-yesno.no{background:rgba(239,68,68,.15);border:2px solid #ef4444;color:#dc2626}
        .f-yesno.maybe{background:rgba(245,158,11,.15);border:2px solid #f59e0b;color:#92400e}
        .f-tap{font-size:.42rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(109,40,217,.4);margin-top:auto;padding-top:.12rem}
        .card-modal{position:fixed;inset:0;background:rgba(15,4,40,.87);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;visibility:hidden;transition:opacity .3s ease,visibility 0s .3s;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);padding:.8rem}

    {id:3,num:"ᚨ",symbol:"ᚨ",color:"#2d5a8e",title:"Ansuz",character:"Elder Futhark · Odin's Rune of Communication",keyword:"Wisdom · Messages · Divine Inspiration",yesNo:"yes",

    {id:6,num:"ᚷ",symbol:"ᚷ",color:"#2e8b57",title:"Gebo",character:"Elder Futhark · Rune of the Gift",keyword:"Exchange · Partnership · Sacred Reciprocity",yesNo:"yes",

    {id:9,num:"ᚾ",symbol:"ᚾ",color:"#2c2c4e",title:"Nauthiz",character:"Elder Futhark · Rune of Need",keyword:"Constraint · Endurance · Necessity",yesNo:"no",

    {id:11,num:"ᛃ",symbol:"ᛃ",color:"#4caf50",title:"Jera",character:"Elder Futhark · Rune of the Harvest",keyword:"Cycles · Patience · Right Timing",yesNo:"yes",

    {id:13,num:"ᛈ",symbol:"ᛈ",color:"#8b3a3a",title:"Perthro",character:"Elder Futhark · Rune of Mystery",keyword:"Fate · Hidden Knowledge · The Unseeable",yesNo:"maybe",

    {id:16,num:"ᛏ",symbol:"ᛏ",color:"#3d5a8e",title:"Tiwaz",character:"Elder Futhark · Tyr's Rune of Justice",keyword:"Justice · Sacrifice · Honor",yesNo:"yes",

// ── State ────────────────────────────────────────────────────────────────────
let activeDeckName = null;
let DECK = [];
let flipped  = [];
let selected = [];
const lastTap  = {};
const TAP_MS   = 320;

function initState() {
    flipped  = new Array(DECK.length).fill(false);
    selected = new Array(DECK.length).fill(false);
}
initState();

// ── Deck Switching ────────────────────────────────────────────────────────────
const MARVEL_DECKS  = new Set(['mystic','avengers','gods']);
const OMKAR_DECKS   = new Set(['vedic','tantrik']);
const CLASSIC_DECKS = new Set(['classic']);
const NORDIC_DECKS  = new Set(['nordic']);

function toggleMarvelMenu() {
    document.getElementById('btn-marvel-group').classList.toggle('open');
    document.getElementById('marvel-submenu').classList.toggle('open');
}
function toggleOmkarMenu() {
    document.getElementById('btn-omkar-group').classList.toggle('open');
    document.getElementById('omkar-submenu').classList.toggle('open');
}
function toggleClassicMenu() {
    document.getElementById('btn-classic-group').classList.toggle('open');
    document.getElementById('classic-submenu').classList.toggle('open');
}
function toggleNordicMenu() {
    document.getElementById('btn-nordic-group').classList.toggle('open');
    document.getElementById('nordic-submenu').classList.toggle('open');
}
function toggleTabMarvelMenu() {
    document.getElementById('tab-marvel-group').classList.toggle('open');
    document.getElementById('tab-marvel-submenu').classList.toggle('open');
}
function toggleTabOmkarMenu() {
    document.getElementById('tab-omkar-group').classList.toggle('open');
    document.getElementById('tab-omkar-submenu').classList.toggle('open');
}
function toggleTabClassicMenu() {
    document.getElementById('tab-classic-group').classList.toggle('open');
    document.getElementById('tab-classic-submenu').classList.toggle('open');
}
function toggleTabNordicMenu() {
    document.getElementById('tab-nordic-group').classList.toggle('open');
    document.getElementById('tab-nordic-submenu').classList.toggle('open');
}

function switchDeck(name) {
    if (name === activeDeckName) return;
    activeDeckName = name;
    const cfg = DECK_CONFIG[name];
    DECK = cfg.data;
    initState();
    closeModal();

    document.body.setAttribute('data-deck', name);

    // Update sidebar brand
    document.getElementById('headerEye').textContent      = cfg.eye;
    document.getElementById('headerTitle').textContent    = cfg.title;
    document.getElementById('headerSubtitle').textContent = cfg.subtitle;
    // Update topbar
    document.getElementById('tb-eye').textContent   = cfg.eye;
    document.getElementById('tb-title').textContent = cfg.title;

    // Sidebar deck button active states
    document.querySelectorAll('.sb-deck-btn').forEach(b => b.classList.remove('active'));
    const sbBtn = document.getElementById('btn-' + name);
    if (sbBtn) sbBtn.classList.add('active');

    // Tabbar deck button active states
    document.querySelectorAll('.tab-deck-btn').forEach(b => b.classList.remove('active'));
    const tabBtn = document.getElementById('tab-btn-' + name);
    if (tabBtn) tabBtn.classList.add('active');

    // Bottom nav active state
    document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
    const bnavBtn = document.getElementById('bnav-' + name);
    if (bnavBtn) bnavBtn.classList.add('active');

    // Group open/active states — sidebar + tabbar
    const isMarvel  = MARVEL_DECKS.has(name);
    const isOmkar   = OMKAR_DECKS.has(name);
    const isClassic = CLASSIC_DECKS.has(name);
    const isNordic  = NORDIC_DECKS.has(name);
    [
        { btn:'btn-marvel-group',   sub:'marvel-submenu',      cls:'marvel-on',  active:isMarvel  },
        { btn:'btn-omkar-group',    sub:'omkar-submenu',       cls:'omkar-on',   active:isOmkar   },
        { btn:'btn-classic-group',  sub:'classic-submenu',     cls:'classic-on', active:isClassic },
        { btn:'btn-nordic-group',   sub:'nordic-submenu',      cls:'nordic-on',  active:isNordic  },
        { btn:'tab-marvel-group',   sub:'tab-marvel-submenu',  cls:'marvel-on',  active:isMarvel  },
        { btn:'tab-omkar-group',    sub:'tab-omkar-submenu',   cls:'omkar-on',   active:isOmkar   },
        { btn:'tab-classic-group',  sub:'tab-classic-submenu', cls:'classic-on', active:isClassic },
        { btn:'tab-nordic-group',   sub:'tab-nordic-submenu',  cls:'nordic-on',  active:isNordic  },
    ].forEach(({ btn, sub, cls, active }) => {
        const b = document.getElementById(btn);
        const s = document.getElementById(sub);
        if (b) { b.classList.toggle(cls, active); b.classList.toggle('open', active); }
        if (s) s.classList.toggle('open', active);
    });

    // Reveal UI on first deck selection
    document.getElementById('stackView').classList.add('hidden');
    document.querySelectorAll('.pre-deck-hidden').forEach(el => el.classList.remove('pre-deck-hidden'));

    updateLayout();
    updateStats();
    renderGrid();
}

// ── Layout ────────────────────────────────────────────────────────────────────
function updateLayout() {
    const vw       = window.innerWidth;
    const sbW      = vw >= 1024 ? 240 : 0; // sidebar only on desktop
    const availW   = vw - sbW;
    const n        = DECK.length;
    let cols;

    if      (vw >= 1024) cols = Math.min(n, 7);
    else if (vw >= 900)  cols = Math.min(n, 5);
    else if (vw >= 700)  cols = Math.min(n, 4);
    else if (vw >= 480)  cols = Math.min(n, 3);
    else if (vw >= 370)  cols = Math.min(n, 2);
    else                 cols = 1;

    const hPad = vw >= 1024 ? 16 : vw >= 480 ? 11 : 7;
    const gap  = 8;
    const cw   = Math.floor((availW - hPad * 2 - (cols - 1) * gap) / cols);
    const ch   = Math.round(cw * 1.7);

    document.documentElement.style.setProperty('--grid-cols', cols);
    document.documentElement.style.setProperty('--card-w', cw + 'px');
    document.documentElement.style.setProperty('--card-h', ch + 'px');
}

// ── Interaction ──────────────────────────────────────────────────────────────
function handleCardClick(i) {
    if (flipped[i]) { showCardModal(i); return; }

    const now = Date.now();
    if (lastTap[i] && (now - lastTap[i]) < TAP_MS) {
        lastTap[i] = 0;
        revealCard(i);
    } else {
        lastTap[i] = now;
        toggleSelect(i);
    }
}

function toggleSelect(i) {
    if (flipped[i]) return;
    selected[i] = !selected[i];
    document.getElementById('wrap-' + i).classList.toggle('selected', selected[i]);
    updateStats();
}

function revealCard(i) {
    if (flipped[i]) return;
    flipped[i] = true; selected[i] = false;
    const cardEl = document.getElementById('card-' + i);
    const wrapEl = document.getElementById('wrap-' + i);
    cardEl.classList.add('flipped');
    wrapEl.classList.add('revealed');
    wrapEl.classList.remove('selected');
    updateStats();
    // Card is now flipped — user taps the revealed card to read meaning
}

function revealSelected() {
    let firstIdx = -1;
    selected.forEach((s, i) => {
        if (s && !flipped[i]) {
            if (firstIdx === -1) firstIdx = i;
            flipped[i] = true; selected[i] = false;
            const cardEl = document.getElementById('card-' + i);
            const wrapEl = document.getElementById('wrap-' + i);
            cardEl.classList.add('flipped');
            wrapEl.classList.add('revealed');
            wrapEl.classList.remove('selected');
        }
    });
    updateStats();
    // Cards are now flipped — user taps any revealed card to read meaning
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function showCardModal(i) {
    const card    = DECK[i];
    const cfg     = DECK_CONFIG[activeDeckName];
    const yn      = card.yesNo;
    const ynLabel = yn === 'yes' ? '✦ YES ✦' : yn === 'no' ? '✦ NO ✦' : '✦ MAYBE ✦';
    const subLine = cfg.modalSubFn(card);

    document.getElementById('modalContent').innerHTML = `
        <span class="modal-symbol" style="color:${card.color}">${card.symbol}</span>
        <div class="modal-title" style="color:${card.color}">${card.title}</div>
        <div class="modal-sub">${subLine}</div>
        <div class="modal-yesno">
            <span class="yesno-badge ${yn}">${ynLabel}</span>
        </div>
        <div class="modal-divider"></div>
        <div class="modal-section-label">What this card is telling you</div>
        <p class="modal-simple">${card.simple}</p>
        <button class="modal-deep-toggle" onclick="toggleDeep(this)">▸ See the deeper meaning</button>
        <p class="modal-deep">${card.meaning}</p>
        <div class="modal-keyword" style="color:${card.color}">✦ ${card.keyword} ✦</div>
    `;
    document.getElementById('cardModal').classList.add('open');
}

function toggleDeep(btn) {
    const deep = btn.nextElementSibling;
    deep.classList.toggle('open');
    btn.textContent = deep.classList.contains('open') ? '▾ Hide deeper meaning' : '▸ See the deeper meaning';
}

function closeModal() {
    document.getElementById('cardModal').classList.remove('open');
}

// ── View All Cards (flip in grid) ─────────────────────────────────────────────
function viewAllCards() {
    const indices = DECK.map((_, i) => i).filter(i => !flipped[i]);
    if (indices.length === 0) return;
    indices.forEach((i, idx) => {
        setTimeout(() => {
            flipped[i] = true; selected[i] = false;
            const cardEl = document.getElementById('card-' + i);
            const wrapEl = document.getElementById('wrap-' + i);
            if (cardEl) cardEl.classList.add('flipped');
            if (wrapEl) { wrapEl.classList.add('revealed'); wrapEl.classList.remove('selected'); }
        }, idx * 55);
    });
    setTimeout(() => updateStats(), indices.length * 55 + 100);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
    const rev      = flipped.filter(Boolean).length;
    const hidden   = DECK.length - rev;
    const selCount = selected.filter((s, i) => s && !flipped[i]).length;

    document.querySelectorAll('.js-revealed').forEach(el => el.textContent = rev);
    document.querySelectorAll('.js-hidden').forEach(el => el.textContent = hidden);

    const showReveal = selCount > 0;
    document.querySelectorAll('.js-reveal-btn').forEach(el => {
        el.style.display = showReveal ? '' : 'none';
    });

    const hintText = selCount > 0
        ? `${selCount} card${selCount > 1 ? 's' : ''} selected — double-tap to reveal`
        : 'Tap · Select · Double-tap to Reveal';
    ['mainHint','sb-hint-mobile'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = hintText;
    });
}

// ── Grid Render ───────────────────────────────────────────────────────────────
function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = DECK.map((card, i) => {
        const yn      = card.yesNo;
        const ynLabel = yn === 'yes' ? 'YES' : yn === 'no' ? 'NO' : 'MAYBE';
        return `
        <div class="card-wrap ${flipped[i]?'revealed':''} ${selected[i]?'selected':''}"
             id="wrap-${i}" onclick="handleCardClick(${i})">
            <div class="card ${flipped[i]?'flipped':''}" id="card-${i}">
                <div class="face face-back">
                    <div class="back-art"><span class="back-rune">${DECK_CONFIG[activeDeckName].rune}</span></div>
                    <div class="back-serial">#${i+1}</div>
                </div>
                <div class="face face-front"
                     style="border-color:${card.color}88;background:linear-gradient(160deg,#fff 0%,${card.color}12 55%,${card.color}08 100%);box-shadow:0 0 18px ${card.color}28,inset 0 0 20px ${card.color}10;">
                    <div class="f-serial" style="background:linear-gradient(135deg,${card.color},${card.color}cc);border-color:${card.color}88">#${i+1}</div>
                    <div class="f-arcana">${card.num}</div>
                    <div class="f-symbol" style="color:${card.color}">${card.symbol}</div>
                    <div class="f-tarot-name" style="color:${card.color}cc">${card.title}</div>
                    <div class="f-marvel-name" style="color:${card.color}">${card.character}</div>
                    <div class="f-line" style="background:linear-gradient(to right,transparent,${card.color},transparent)"></div>
                    <span class="f-yesno ${yn}">${ynLabel}</span>
                    <div class="f-keyword" style="color:${card.color}dd">${card.keyword}</div>
                    <div class="f-tap">tap to read</div>
                </div>
            </div>
        </div>`;
    }).join('');
}

// ── Deck Actions ──────────────────────────────────────────────────────────────
function resetAll() {
    initState();
    closeModal(); updateStats(); renderGrid();
}

function shuffleDeck() {
    initState();
    closeModal(); updateStats();

    const grid       = document.getElementById('grid');
    const shuffleBtn = document.getElementById('shuffleBtn');
    if (shuffleBtn) shuffleBtn.disabled = true;

    const gridRect = grid.getBoundingClientRect();
    const cx = gridRect.left + gridRect.width  / 2;
    const cy = gridRect.top  + gridRect.height / 2 + window.scrollY;

    // Phase 1 — cards fly into a centre pile
    const wraps = Array.from(grid.querySelectorAll('.card-wrap'));
    wraps.forEach((wrap, idx) => {
        const r   = wrap.getBoundingClientRect();
        const dx  = cx - (r.left + r.width  / 2);
        const dy  = (cy - window.scrollY) - (r.top  + r.height / 2);
        const rot = (Math.random() - 0.5) * 45;
        setTimeout(() => {
            wrap.style.transition = 'transform 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.32s ease';
            wrap.style.transform  = `translate(${dx}px,${dy}px) scale(0.48) rotate(${rot}deg)`;
            wrap.style.opacity    = '0.55';
            wrap.style.zIndex     = '50';
        }, idx * 22);
    });

    const gatherMs = wraps.length * 22 + 380;

    // Phase 2 — shuffle data, re-render, deal cards out
    setTimeout(() => {
        for (let i = DECK.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [DECK[i], DECK[j]] = [DECK[j], DECK[i]];
        }
        renderGrid();

        requestAnimationFrame(() => requestAnimationFrame(() => {
            const newWraps = Array.from(grid.querySelectorAll('.card-wrap'));

            // Set all cards to pile position instantly
            newWraps.forEach(wrap => {
                const r   = wrap.getBoundingClientRect();
                const dx  = cx - (r.left + r.width  / 2);
                const dy  = (cy - window.scrollY) - (r.top  + r.height / 2);
                const rot = (Math.random() - 0.5) * 55;
                wrap.style.transition = 'none';
                wrap.style.transform  = `translate(${dx}px,${dy}px) scale(0.35) rotate(${rot}deg)`;
                wrap.style.opacity    = '0';
            });

            // Deal each card out with stagger
            requestAnimationFrame(() => {
                newWraps.forEach((wrap, idx) => {
                    setTimeout(() => {
                        wrap.style.transition = `transform 0.52s cubic-bezier(0.175,0.885,0.32,1.275), opacity 0.38s ease`;
                        wrap.style.transform  = '';
                        wrap.style.opacity    = '';
                    }, idx * 38);
                });

                const cleanupMs = newWraps.length * 38 + 620;
                setTimeout(() => {
                    newWraps.forEach(w => { w.style.cssText = ''; });
                    if (shuffleBtn) shuffleBtn.disabled = false;
                }, cleanupMs);
            });
        }));
    }, gatherMs);
}

// ── Particles ─────────────────────────────────────────────────────────────────
(function(){
    const canvas = document.getElementById('particles');
    const ctx    = canvas.getContext('2d');
    const colors = ['#ff50dc','#c84fff','#fbbf24','#34d399','#60a5fa','#ff6b8a','#a78bfa','#fb923c'];
    let W, H, pts;

    function init() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        pts = Array.from({length:70}, () => ({
            x: Math.random()*W, y: Math.random()*H + H,
            r: Math.random()*1.8+0.4, speed: Math.random()*.5+.18,
            drift: (Math.random()-.5)*.4,
            color: colors[Math.floor(Math.random()*colors.length)],
            alpha: Math.random()*.5+.15
        }));
    }
    function loop() {
        ctx.clearRect(0,0,W,H);
        for (const p of pts) {
            p.y -= p.speed; p.x += p.drift;
            if (p.y < -10) { p.y = H+10; p.x = Math.random()*W; }
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle   = p.color;
            ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        requestAnimationFrame(loop);
    }
    window.addEventListener('resize', init);
    init(); loop();
})();

// ── Boot ──────────────────────────────────────────────────────────────────────
renderGrid();
updateStats();
updateLayout();

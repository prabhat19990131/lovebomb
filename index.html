<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Arts Tarot — Dr. Strange Oracle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #07001a;
            color: #e0c4ff;
            font-family: 'Georgia', serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed;
            top: 50%; left: 50%;
            width: 1000px; height: 1000px;
            transform: translate(-50%, -50%);
            background: radial-gradient(ellipse, rgba(255,100,0,0.06) 0%, rgba(120,0,220,0.08) 40%, transparent 70%);
            animation: bg-rotate 30s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes bg-rotate {
            from { transform: translate(-50%,-50%) rotate(0deg); }
            to   { transform: translate(-50%,-50%) rotate(360deg); }
        }

        .portal-rings {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            pointer-events: none;
            z-index: 0;
        }
        .ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            border-radius: 50%;
            border: 1.5px solid rgba(255,120,0,0.1);
            animation: ring-breathe 5s ease-in-out infinite;
        }
        .ring:nth-child(1){width:160px;height:160px;animation-delay:0s}
        .ring:nth-child(2){width:340px;height:340px;animation-delay:.6s}
        .ring:nth-child(3){width:540px;height:540px;animation-delay:1.2s}
        .ring:nth-child(4){width:760px;height:760px;animation-delay:1.8s}
        .ring:nth-child(5){width:1000px;height:1000px;animation-delay:2.4s}
        @keyframes ring-breathe {
            0%,100%{opacity:.1} 50%{opacity:.32}
        }

        #particles { position:fixed; inset:0; pointer-events:none; z-index:0; }

        /* Layout */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 1.5rem 5rem;
            text-align: center;
        }

        /* Header */
        header { margin-bottom: 2rem; }
        .eye {
            font-size: 3rem;
            display: block;
            filter: drop-shadow(0 0 18px rgba(255,130,0,0.9));
            animation: eye-glow 3s ease-in-out infinite;
        }
        @keyframes eye-glow {
            0%,100%{filter:drop-shadow(0 0 18px rgba(255,130,0,.9))}
            50%{filter:drop-shadow(0 0 38px rgba(255,200,0,1))}
        }
        h1 {
            font-size: clamp(1.7rem, 4.5vw, 2.8rem);
            background: linear-gradient(135deg,#ff8c00 0%,#ffd700 50%,#ff6b00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 0.4rem 0 0.2rem;
        }
        .subtitle {
            font-size: 0.72rem;
            color: rgba(200,150,255,.55);
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        .divider {
            width: 200px; height: 1px;
            background: linear-gradient(to right,transparent,#ff8c00,transparent);
            margin: 1rem auto 0;
        }

        /* Stats */
        .deck-stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin: 1.6rem 0 1.2rem;
        }
        .stat { text-align: center; }
        .stat-num { font-size: 1.9rem; font-weight: bold; color: #ff8c00; line-height: 1; }
        .stat-label { font-size: 0.58rem; color: rgba(200,150,255,.45); letter-spacing: 3px; text-transform: uppercase; margin-top:.2rem; }

        /* Controls */
        .controls { display:flex; justify-content:center; gap:1rem; flex-wrap:wrap; margin-bottom:.8rem; }
        .btn {
            padding: .7rem 1.8rem;
            border: 2px solid #ff8c00;
            background: transparent;
            color: #ff8c00;
            font-family: 'Georgia',serif;
            font-size: .85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all .3s ease;
            border-radius: 2px;
        }
        .btn::after {
            content:'';
            position:absolute; inset:0;
            background:linear-gradient(90deg,transparent,rgba(255,140,0,.15),transparent);
            transform:translateX(-100%);
            transition:transform .5s ease;
        }
        .btn:hover::after{transform:translateX(100%)}
        .btn:hover{background:rgba(255,140,0,.08);box-shadow:0 0 22px rgba(255,140,0,.5);color:#ffd700}
        .btn:active{transform:scale(.97)}

        .btn-reset {
            border-color: rgba(200,150,255,.4);
            color: rgba(200,150,255,.6);
        }
        .btn-reset:hover{background:rgba(200,150,255,.08);box-shadow:0 0 22px rgba(200,150,255,.3);color:#e0c4ff}

        .hint {
            font-size:.62rem;
            color:rgba(200,150,255,.3);
            letter-spacing:3px;
            text-transform:uppercase;
            margin-bottom:2rem;
        }

        /* Card Grid — all 22 cards shown */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1.2rem;
            justify-items: center;
        }

        /* Each card */
        .card-wrap {
            perspective: 1100px;
            width: 150px;
            height: 255px;
            cursor: pointer;
        }

        .card {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform .85s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .card:hover:not(.flipped) {
            transform: translateY(-10px) scale(1.04);
            filter: drop-shadow(0 14px 28px rgba(255,120,0,0.5));
        }
        .card.flipped { transform: rotateY(180deg); }

        .face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            border-radius: 10px;
            overflow: hidden;
        }

        /* Card back */
        .face-back {
            background: linear-gradient(145deg,#0a0028 0%,#180045 55%,#0a0020 100%);
            border: 2px solid rgba(255,120,0,.4);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 24px rgba(255,100,0,.15), inset 0 0 36px rgba(100,0,200,.22);
        }
        .back-art {
            width: 118px; height: 215px;
            border: 1px solid rgba(255,120,0,.22);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .back-art::before {
            content:''; position:absolute;
            top:50%; left:50%; transform:translate(-50%,-50%);
            width:88px; height:88px;
            border-radius:50%;
            border:2px solid rgba(255,120,0,.3);
            box-shadow:0 0 16px rgba(255,100,0,.28);
        }
        .back-art::after {
            content:''; position:absolute;
            top:50%; left:50%; transform:translate(-50%,-50%);
            width:56px; height:56px;
            border-radius:50%;
            border:1px solid rgba(255,190,0,.4);
        }
        .back-rune {
            font-size:1.9rem;
            z-index:1;
            filter:drop-shadow(0 0 10px rgba(255,130,0,.9));
            animation:slow-spin 12s linear infinite;
        }
        @keyframes slow-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

        /* Card front */
        .face-front {
            transform: rotateY(180deg);
            background: linear-gradient(155deg,#0c0028 0%,#1a0055 45%,#0c0030 100%);
            border: 2px solid rgba(255,120,0,.35);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: .75rem .6rem;
            box-shadow: inset 0 0 28px rgba(100,0,200,.32);
        }
        .f-arcana {
            font-size:.5rem; letter-spacing:2.5px;
            text-transform:uppercase; color:rgba(255,120,0,.5);
        }
        .f-symbol {
            font-size:2.6rem;
            margin:.28rem 0;
            animation:sym-breathe 2.5s ease-in-out infinite;
        }
        @keyframes sym-breathe{
            0%,100%{transform:scale(1);filter:drop-shadow(0 0 8px currentColor)}
            50%{transform:scale(1.1);filter:drop-shadow(0 0 20px currentColor)}
        }
        .f-tarot-name {
            font-size:.52rem; letter-spacing:2px;
            text-transform:uppercase; color:rgba(255,120,0,.72);
            text-align:center;
        }
        .f-marvel-name {
            font-size:.72rem; font-weight:bold;
            color:#e0c4ff; text-align:center;
            line-height:1.2; margin:.25rem 0;
        }
        .f-line {
            width:78%; height:1px; margin:.35rem 0;
            background:linear-gradient(to right,transparent,rgba(255,120,0,.45),transparent);
        }
        .f-keyword {
            font-size:.5rem; letter-spacing:1.8px;
            text-transform:uppercase; color:#ffd700;
            text-align:center; margin-bottom:.3rem;
        }
        .f-preview {
            font-size:.52rem;
            color:rgba(200,175,255,.72);
            text-align:center;
            line-height:1.5;
            flex-grow:1;
            display:flex;
            align-items:center;
        }
        .f-tap {
            font-size:.46rem; letter-spacing:2px;
            text-transform:uppercase;
            color:rgba(255,120,0,.38);
            margin-top:.35rem;
        }

        /* Meaning panel */
        .meaning-panel {
            display:none;
            max-width:700px;
            margin:2.5rem auto 0;
            background:rgba(8,0,28,.93);
            border:1px solid rgba(255,120,0,.3);
            border-radius:10px;
            padding:1.6rem 2rem;
            animation:panel-in .4s ease;
        }
        .meaning-panel.show{display:block}
        @keyframes panel-in{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
        .panel-header{font-size:.7rem;letter-spacing:4px;text-transform:uppercase;margin-bottom:.7rem}
        .panel-body{color:rgba(212,188,255,.92);line-height:1.88;font-size:.95rem;margin-bottom:1rem}
        .panel-keyword{font-size:.7rem;letter-spacing:3px;text-transform:uppercase}

        /* Revealed badge on card */
        .card-wrap.revealed .face-back { opacity: .45; }

        /* Selected state highlight */
        .card-wrap.selected .face-back {
            border-color: #ffd700;
            box-shadow: 0 0 35px rgba(255,215,0,0.6), inset 0 0 36px rgba(100,0,200,.4);
            filter: brightness(1.2);
        }
        .card-wrap.selected {
            transform: translateY(-8px) scale(1.02);
        }

        .meaning-panel.show{display:block; max-height: 80vh; overflow-y: auto;}
        .card-entry {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,120,0,0.15);
        }
        .card-entry:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .card-entry h3 { margin-bottom: 0.5rem; }


        /* Responsive Breakpoints */

        /* Tablet (Large) */
        @media(max-width: 1024px) {
            .container { padding-top: 1.5rem; }
            h1 { letter-spacing: 3px; }
            .deck-stats { gap: 2rem; }
        }

        /* Tablet (Small) / Landscape Phone */
        @media(max-width: 768px) {
            .card-wrap { width: 140px; height: 238px; }
            .grid { gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            .btn { padding: .65rem 1.4rem; font-size: .8rem; }
            .meaning-panel { padding: 1.2rem 1.4rem; }
            .panel-header { font-size: .65rem; }
            .panel-body { font-size: .88rem; line-height: 1.6; }
        }

        /* Phone */
        @media(max-width: 480px) {
            .eye { font-size: 2.2rem; }
            h1 { font-size: 1.5rem; letter-spacing: 2px; }
            .subtitle { font-size: 0.6rem; letter-spacing: 3px; }
            .deck-stats { gap: 1.2rem; margin: 1.2rem 0; }
            .stat-num { font-size: 1.5rem; }
            .stat-label { font-size: 0.5rem; letter-spacing: 1.5px; }

            .card-wrap { width: 110px; height: 185px; }
            .grid { gap: 0.7rem; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }

            .controls { gap: 0.6rem; }
            .btn { padding: 0.7rem 1.1rem; font-size: 0.75rem; width: 100%; }

            .f-arcana { font-size: 0.4rem; }
            .f-symbol { font-size: 1.8rem; }
            .f-marvel-name { font-size: 0.6rem; }
            .f-preview { display: none; } /* Hide preview text on small mobile cards to save space */
            .f-tap { font-size: 0.4rem; }

            .meaning-panel { margin-top: 1.8rem; }
        }

        /* Very Small Phone */
        @media(max-width: 360px) {
            .card-wrap { width: 95px; height: 160px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); }
        }

    </style>
</head>
<body>

<div class="bg-glow"></div>
<div class="portal-rings">
    <div class="ring"></div><div class="ring"></div>

    <div class="controls">
        <button class="btn" id="revealBtn" onclick="revealSelected()" style="background: rgba(255,215,0,0.15); border-color: #ffd700; color: #ffd700; display: none;">✦ Reveal Magic ✦</button>
        <button class="btn" onclick="shuffleDeck()">✦ Shuffle Deck ✦</button>
        <button class="btn btn-reset" onclick="resetAll()">✦ Reset All Cards ✦</button>

    <p class="hint" id="mainHint">Select the cards that call to you, then reveal their secrets</p>

    <div class="grid" id="grid"></div>

    <div class="meaning-panel" id="meaningPanel">
        <div id="meaningContent"></div>
    </div>
</div>

// State
const flipped = new Array(22).fill(false);
const selected = new Array(22).fill(false);


function updateStats() {
    const rev = flipped.filter(Boolean).length;
    document.getElementById('revealed-count').textContent = rev;
    document.getElementById('hidden-count').textContent = 22 - rev;

    // Show reveal button if cards are selected and not all already revealed
    const selCount = selected.filter((s, i) => s && !flipped[i]).length;
    document.getElementById('revealBtn').style.display = selCount > 0 ? 'inline-block' : 'none';
    document.getElementById('mainHint').textContent = selCount > 0
        ? `You have selected ${selCount} card${selCount > 1 ? 's' : ''}`
        : "Select the cards that call to you, then reveal their secrets";
}

function toggleSelect(i) {
    if (flipped[i]) return; // Cannot select already revealed cards

    selected[i] = !selected[i];
    const wrapEl = document.getElementById('wrap-' + i);

    if (selected[i]) {
        wrapEl.classList.add('selected');
    } else {
        wrapEl.classList.remove('selected');
    }
    updateStats();
}

function revealSelected() {
    const revealedIndices = [];
    selected.forEach((s, i) => {
        if (s && !flipped[i]) {
            flipped[i] = true;
            revealedIndices.push(i);
            const cardEl = document.getElementById('card-' + i);
            const wrapEl = document.getElementById('wrap-' + i);
            cardEl.classList.add('flipped');
            wrapEl.classList.add('revealed');
            wrapEl.classList.remove('selected');
            selected[i] = false; // Reset selection once revealed
        }
    });

    if (revealedIndices.length > 0) {
        showMeanings();
    }
    updateStats();
}

function showMeanings() {
    const panel = document.getElementById('meaningPanel');
    const content = document.getElementById('meaningContent');

    // Get all cards that are currently flipped
    const revealedCards = DECK.filter((_, i) => flipped[i]);

    if (revealedCards.length === 0) {
        panel.classList.remove('show');
        return;
    }

    content.innerHTML = revealedCards.map(card => `
        <div class="card-entry">
            <div class="panel-header" style="color:${card.color}">${card.symbol} ${card.marvel} — ${card.title}</div>
            <p class="panel-body">${card.meaning}</p>
            <div class="panel-keyword" style="color:${card.color}">✦ ${card.keyword} ✦</div>
        </div>
    `).join('');

    panel.classList.add('show');
    panel.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function hideMeaning() {
    document.getElementById('meaningPanel').classList.remove('show');
}

function resetAll() {
    flipped.fill(false);
    selected.fill(false);
    hideMeaning();
    updateStats();
    renderGrid();
}

function shuffleDeck() {
    // Standard practice: reset cards before shuffling
    flipped.fill(false);
    selected.fill(false);
    hideMeaning();
    updateStats();

    // Fisher-Yates Shuffle
    for (let i = DECK.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [DECK[i], DECK[j]] = [DECK[j], DECK[i]];
    }

    // Visual feedback: brief grid animation
    const grid = document.getElementById('grid');
    grid.style.opacity = '0';
    grid.style.transform = 'scale(0.95)';
    grid.style.transition = 'all 0.4s ease';

    setTimeout(() => {
        renderGrid();
        grid.style.opacity = '1';
        grid.style.transform = 'scale(1)';
    }, 400);
}

function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = DECK.map((card, i) => `
        <div class="card-wrap ${flipped[i] ? 'revealed' : ''} ${selected[i] ? 'selected' : ''}"
             id="wrap-${i}" onclick="toggleSelect(${i})">
            <div class="card ${flipped[i] ? 'flipped' : ''}" id="card-${i}">
                <div class="face face-back">
                    <div class="back-art">
                        <span class="back-rune">✦</span>
                    </div>
                </div>
                <div class="face face-front"
                     style="border-color:${card.color}55;
                            box-shadow:0 0 26px ${card.color}25, inset 0 0 28px rgba(100,0,200,.32);">
                    <div class="f-arcana">Major Arcana ${card.num}</div>
                    <div class="f-symbol" style="color:${card.color}">${card.symbol}</div>
                    <div class="f-tarot-name">${card.title}</div>
                    <div class="f-marvel-name">${card.marvel}</div>
                    <div class="f-line" style="background:linear-gradient(to right,transparent,${card.color}70,transparent)"></div>
                    <div class="f-keyword">${card.keyword}</div>
                    <div class="f-preview">${card.meaning.substring(0, 100)}…</div>
                    <div class="f-tap">revealed</div>
                </div>
            </div>
        </div>
    `).join('');
}

// Particles
(function(){
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    const colors = ['#ff8c00','#ffd700','#c084fc','#ff6b00','#00aaff','#ff44ff'];
    let W, H, pts;

    function init(){
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        pts = Array.from({length:70}, ()=>({
            x: Math.random()*W,
            y: Math.random()*H + H,
            r: Math.random()*1.8+0.4,
            speed: Math.random()*.5+.18,
            drift: (Math.random()-.5)*.4,
            color: colors[Math.floor(Math.random()*colors.length)],
            alpha: Math.random()*.5+.15
        }));
    }

    function loop(){
        ctx.clearRect(0,0,W,H);
        for(const p of pts){
            p.y -= p.speed; p.x += p.drift;
            if(p.y < -10){ p.y = H+10; p.x = Math.random()*W; }
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        requestAnimationFrame(loop);
    }

    window.addEventListener('resize', init);
    init(); loop();
})();

// Boot
renderGrid();
updateStats();
</script>
</body>
</html>

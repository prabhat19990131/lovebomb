<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Tarot Oracle</title>
    <style>
        :root { --card-w: 150px; --card-h: 255px; --grid-cols: 7; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #07001a;
            color: #e0c4ff;
            font-family: 'Georgia', serif;
            min-height: 100vh;
        }

        .bg-glow {
            position: fixed;
            top: 50%; left: 50%;
            width: 1000px; height: 1000px;
            transform: translate(-50%, -50%);
            background: radial-gradient(ellipse, rgba(255,100,0,0.06) 0%, rgba(120,0,220,0.08) 40%, transparent 70%);
            animation: bg-rotate 30s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes bg-rotate {
            from { transform: translate(-50%,-50%) rotate(0deg); }
            to   { transform: translate(-50%,-50%) rotate(360deg); }
        }
        .portal-rings {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            pointer-events: none; z-index: 0;
        }
        .ring {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            border-radius: 50%;
            border: 1.5px solid rgba(255,120,0,0.1);
            animation: ring-breathe 5s ease-in-out infinite;
        }
        .ring:nth-child(1){width:160px;height:160px;animation-delay:0s}
        .ring:nth-child(2){width:340px;height:340px;animation-delay:.6s}
        .ring:nth-child(3){width:540px;height:540px;animation-delay:1.2s}
        .ring:nth-child(4){width:760px;height:760px;animation-delay:1.8s}
        .ring:nth-child(5){width:1000px;height:1000px;animation-delay:2.4s}
        @keyframes ring-breathe { 0%,100%{opacity:.1} 50%{opacity:.32} }
        #particles { position:fixed; inset:0; pointer-events:none; z-index:0; }

        /* ── Layout ── */
        .container {
            position: relative; z-index: 1;
            padding: 1.2rem 1rem 2rem;
            text-align: center;
        }

        /* Header */
        header { margin-bottom: 0.5rem; }
        .eye {
            font-size: 1.8rem; display: block;
            filter: drop-shadow(0 0 14px rgba(255,130,0,0.9));
            animation: eye-glow 3s ease-in-out infinite;
        }
        @keyframes eye-glow {
            0%,100%{filter:drop-shadow(0 0 14px rgba(255,130,0,.9))}
            50%{filter:drop-shadow(0 0 28px rgba(255,200,0,1))}
        }
        h1 {
            font-size: clamp(1.1rem, 3vw, 1.9rem);
            background: linear-gradient(135deg,#ff8c00 0%,#ffd700 50%,#ff6b00 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px; text-transform: uppercase;
            margin: 0.2rem 0 0.1rem;
        }
        .subtitle {
            font-size: 0.62rem; color: rgba(200,150,255,.5);
            letter-spacing: 4px; text-transform: uppercase;
        }
        .divider {
            width: 160px; height: 1px;
            background: linear-gradient(to right,transparent,#ff8c00,transparent);
            margin: 0.5rem auto 0;
        }

        /* Deck Selector */
        .deck-selector {
            display: flex; justify-content: center; align-items: center;
            gap: 0.7rem; flex-wrap: wrap;
            margin: 0.9rem 0 0.6rem;
        }
        .deck-btn {
            padding: .48rem 1.1rem;
            border: 2px solid rgba(200,150,255,.3);
            background: transparent; color: rgba(200,150,255,.6);
            font-family: 'Georgia',serif; font-size: .72rem;
            letter-spacing: 1.5px; text-transform: uppercase;
            cursor: pointer; border-radius: 4px;
            transition: all .3s ease;
        }
        .deck-btn:hover {
            border-color: rgba(255,215,0,.6);
            color: #ffd700;
            box-shadow: 0 0 14px rgba(255,215,0,.3);
        }
        .deck-btn.active {
            border-color: #ffd700;
            color: #ffd700;
            background: rgba(255,215,0,.08);
            box-shadow: 0 0 20px rgba(255,215,0,.5), inset 0 0 12px rgba(255,215,0,.06);
        }
        /* Collapsible Marvel group */
        .deck-group { position: relative; display: inline-flex; flex-direction: column; align-items: center; gap: .5rem; }
        .deck-parent { position: relative; }
        .deck-parent .arrow { display: inline-block; margin-left: .3rem; transition: transform .3s ease; font-style: normal; font-size: .6rem; }
        .deck-parent.open .arrow { transform: rotate(180deg); }
        .deck-parent.marvel-on {
            border-color: rgba(255,215,0,.7);
            color: #ffd700;
            box-shadow: 0 0 14px rgba(255,215,0,.25);
        }
        .deck-submenu {
            display: flex; flex-direction: row; gap: .45rem; flex-wrap: wrap; justify-content: center;
            overflow: hidden; max-height: 0; opacity: 0;
            transition: max-height .35s ease, opacity .28s ease;
        }
        .deck-submenu.open { max-height: 80px; opacity: 1; }
        .deck-btn.sub {
            font-size: .65rem; padding: .35rem .85rem;
            border-color: rgba(180,130,255,.25);
        }

        /* Stats */
        .deck-stats {
            display: flex; justify-content: center;
            gap: 2.5rem; margin: 0.5rem 0 0.4rem;
        }
        .stat { text-align: center; }
        .stat-num { font-size: 1.35rem; font-weight: bold; color: #ff8c00; line-height: 1; }
        .stat-label { font-size: 0.5rem; color: rgba(200,150,255,.45); letter-spacing: 3px; text-transform: uppercase; margin-top:.15rem; }

        /* Controls */
        .controls { display:flex; justify-content:center; gap:0.6rem; flex-wrap:wrap; margin-bottom:.4rem; }
        .btn {
            padding: .42rem 1.1rem;
            border: 2px solid #ff8c00;
            background: transparent; color: #ff8c00;
            font-family: 'Georgia',serif; font-size: .72rem;
            letter-spacing: 1.5px; text-transform: uppercase;
            cursor: pointer; position: relative; overflow: hidden;
            transition: all .3s ease; border-radius: 2px;
        }
        .btn::after {
            content:''; position:absolute; inset:0;
            background:linear-gradient(90deg,transparent,rgba(255,140,0,.15),transparent);
            transform:translateX(-100%); transition:transform .5s ease;
        }
        .btn:hover::after{transform:translateX(100%)}
        .btn:hover{background:rgba(255,140,0,.08);box-shadow:0 0 18px rgba(255,140,0,.5);color:#ffd700}
        .btn:active{transform:scale(.97)}
        .btn:disabled{opacity:.45;cursor:default;}
        .btn-reset { border-color:rgba(200,150,255,.4); color:rgba(200,150,255,.6); }
        .btn-reset:hover{background:rgba(200,150,255,.08);box-shadow:0 0 18px rgba(200,150,255,.3);color:#e0c4ff}
        .btn-view { border-color:rgba(0,220,180,.5); color:rgba(0,220,180,.7); }
        .btn-view:hover{background:rgba(0,220,180,.08);box-shadow:0 0 18px rgba(0,220,180,.3);color:#00ffcc}


        .hint {
            font-size:.55rem; color:rgba(200,150,255,.3);
            letter-spacing:3px; text-transform:uppercase;
            margin-bottom:.6rem;
        }

        /* ── Card Grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-cols), var(--card-w));
            gap: 8px;
            justify-content: center;
            margin: 0 auto;
        }

        .card-wrap {
            perspective: 1100px;
            width: var(--card-w);
            height: var(--card-h);
            cursor: pointer;
        }
        .card {
            width: 100%; height: 100%;
            position: relative; transform-style: preserve-3d;
            transition: transform .85s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .card:hover:not(.flipped) {
            transform: translateY(-6px) scale(1.05);
            filter: drop-shadow(0 10px 20px rgba(255,120,0,0.5));
        }
        .card.flipped { transform: rotateY(180deg); }
        .face {
            position: absolute; inset: 0;
            backface-visibility: hidden;
            border-radius: 8px; overflow: hidden;
        }

        /* Card back */
        .face-back {
            background: linear-gradient(145deg,#0a0028 0%,#180045 55%,#0a0020 100%);
            border: 2px solid rgba(255,120,0,.4);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(255,100,0,.15), inset 0 0 30px rgba(100,0,200,.22);
        }
        .back-art {
            width: 80%; height: 84%;
            border: 1px solid rgba(255,120,0,.22);
            border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .back-art::before {
            content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            width:55px; height:55px; border-radius:50%;
            border:2px solid rgba(255,120,0,.3);
            box-shadow:0 0 12px rgba(255,100,0,.28);
        }
        .back-art::after {
            content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            width:34px; height:34px; border-radius:50%;
            border:1px solid rgba(255,190,0,.4);
        }
        .back-rune {
            font-size:1.6rem; z-index:1;
            filter:drop-shadow(0 0 8px rgba(255,130,0,.9));
            animation:slow-spin 12s linear infinite;
        }
        @keyframes slow-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

        /* Card front */
        .face-front {
            transform: rotateY(180deg);
            background: linear-gradient(155deg,#0c0028 0%,#1a0055 45%,#0c0030 100%);
            border: 2px solid rgba(255,120,0,.35);
            display: flex; flex-direction: column; align-items: center;
            padding: .6rem .5rem;
            box-shadow: inset 0 0 24px rgba(100,0,200,.32);
        }
        .f-arcana { font-size:.44rem; letter-spacing:2px; text-transform:uppercase; color:rgba(255,120,0,.5); }
        .f-symbol {
            font-size:2.1rem; margin:.2rem 0;
            animation:sym-breathe 2.5s ease-in-out infinite;
        }
        @keyframes sym-breathe{
            0%,100%{transform:scale(1);filter:drop-shadow(0 0 6px currentColor)}
            50%{transform:scale(1.1);filter:drop-shadow(0 0 16px currentColor)}
        }
        .f-tarot-name { font-size:.46rem; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,120,0,.72); text-align:center; }
        .f-marvel-name { font-size:.6rem; font-weight:bold; color:#e0c4ff; text-align:center; line-height:1.2; margin:.18rem 0; }
        .f-line { width:78%; height:1px; margin:.22rem 0; background:linear-gradient(to right,transparent,rgba(255,120,0,.45),transparent); }
        .f-keyword { font-size:.42rem; letter-spacing:1.5px; text-transform:uppercase; color:#ffd700; text-align:center; margin-bottom:.18rem; }
        .f-yesno {
            font-size:.62rem; font-weight:bold; letter-spacing:2.5px;
            padding:.2rem .6rem; border-radius:50px;
            margin:.14rem 0 .18rem;
        }
        .f-yesno.yes  { background:rgba(0,255,100,.12); border:1.5px solid #00e664; color:#00e664; }
        .f-yesno.no   { background:rgba(255,60,60,.12);  border:1.5px solid #ff4444; color:#ff4444; }
        .f-yesno.maybe{ background:rgba(255,200,0,.12);  border:1.5px solid #ffd700; color:#ffd700; }
        .f-tap { font-size:.4rem; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,120,0,.35); margin-top:auto; }

        /* ── Card Modal (full-screen overlay) ── */
        .card-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,14,0.82);
            z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            visibility: hidden;
            transition: opacity .3s ease, visibility 0s .3s;
            -webkit-backdrop-filter: blur(5px);
            backdrop-filter: blur(5px);
            padding: 1rem;
        }
        .card-modal.open {
            opacity: 1; pointer-events: all; visibility: visible;
            transition: opacity .3s ease, visibility 0s 0s;
        }
        .modal-box {
            background: rgba(8,0,30,0.97);
            border: 1px solid rgba(255,120,0,.45);
            border-radius: 14px;
            padding: 1.8rem 1.8rem 1.4rem;
            max-width: 480px; width: 100%;
            max-height: 88vh; overflow-y: auto;
            position: relative;
            box-shadow: 0 0 60px rgba(255,100,0,.18), inset 0 0 40px rgba(80,0,180,.18);
            animation: modal-in .3s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        @keyframes modal-in {
            from { transform: scale(0.82) translateY(30px); opacity: 0; }
            to   { transform: scale(1)    translateY(0);    opacity: 1; }
        }
        .modal-close {
            position: absolute; top: .9rem; right: 1rem;
            background: none; border: none;
            color: rgba(200,150,255,.55); font-size: 1.3rem;
            cursor: pointer; line-height: 1; transition: color .2s;
        }
        .modal-close:hover { color: #ff8c00; }
        .modal-symbol {
            font-size: 3rem; display: block; text-align: center; margin-bottom: .5rem;
            animation: sym-breathe 2.5s ease-in-out infinite;
        }
        .modal-title { text-align:center; font-size:1.1rem; font-weight:bold; letter-spacing:2px; margin-bottom:.15rem; }
        .modal-sub { text-align:center; font-size:.65rem; letter-spacing:3px; text-transform:uppercase; color:rgba(255,120,0,.6); margin-bottom:.9rem; }
        .modal-yesno { display:flex; justify-content:center; margin-bottom:1.1rem; }
        .yesno-badge {
            font-size: 1.35rem; font-weight: bold; letter-spacing: 5px;
            padding: .45rem 2rem; border-radius: 50px;
        }
        .yesno-badge.yes   { background:rgba(0,255,100,.14); border:2px solid #00e664; color:#00e664; text-shadow:0 0 14px #00e664; }
        .yesno-badge.no    { background:rgba(255,60,60,.14);  border:2px solid #ff4444; color:#ff4444; text-shadow:0 0 14px #ff4444; }
        .yesno-badge.maybe { background:rgba(255,200,0,.14);  border:2px solid #ffd700; color:#ffd700; text-shadow:0 0 14px #ffd700; }
        .modal-divider { height:1px; background:linear-gradient(to right,transparent,rgba(255,120,0,.35),transparent); margin:.85rem 0; }
        .modal-section-label { font-size:.55rem; letter-spacing:3.5px; text-transform:uppercase; color:rgba(200,150,255,.4); margin-bottom:.4rem; }
        .modal-simple { font-size:1rem; color:#e8d8ff; line-height:1.65; margin-bottom:.5rem; }
        .modal-deep-toggle {
            background:none; border:none; color:rgba(255,120,0,.5);
            font-size:.6rem; letter-spacing:2.5px; text-transform:uppercase;
            cursor:pointer; padding:0; margin-bottom:.5rem; transition:color .2s;
        }
        .modal-deep-toggle:hover { color:#ff8c00; }
        .modal-deep { font-size:.85rem; color:rgba(200,175,255,.7); line-height:1.75; display:none; padding-top:.4rem; }
        .modal-deep.open { display:block; }
        .modal-keyword { text-align:center; font-size:.58rem; letter-spacing:3px; text-transform:uppercase; margin-top:.8rem; }

        /* Card states */
        .card-wrap.selected .face-back {
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.6), inset 0 0 30px rgba(100,0,200,.4);
            filter: brightness(1.2);
        }
        .card-wrap.selected { transform: translateY(-6px) scale(1.03); }
        .card-wrap.selected .back-rune {
            animation: slow-spin 12s linear infinite, hint-pulse 1s ease-in-out infinite;
        }
        @keyframes hint-pulse {
            0%,100%{filter:drop-shadow(0 0 8px rgba(255,215,0,.7))}
            50%{filter:drop-shadow(0 0 18px rgba(255,215,0,1))}
        }
        .card-wrap.revealed .face-back { opacity:.45; }
        .card-wrap.revealed .face-front { cursor:pointer; }

        /* ══════════════════════════════════════════════════
           VEDIC DECK — Saffron temple / mandala aesthetic
           ══════════════════════════════════════════════════ */
        body[data-deck="vedic"] {
            background: #0e0600;
            color: #ffe8c0;
        }
        body[data-deck="vedic"] .bg-glow {
            background: radial-gradient(ellipse, rgba(255,140,0,.09) 0%, rgba(180,70,0,.1) 40%, transparent 70%);
        }
        body[data-deck="vedic"] .ring { border-color: rgba(255,145,20,.14); }
        /* Card back */
        body[data-deck="vedic"] .face-back {
            background: linear-gradient(145deg,#1e0900 0%,#40180a 55%,#140600 100%);
            border: 2px solid rgba(255,160,30,.52);
            box-shadow: 0 0 22px rgba(255,140,0,.2), inset 0 0 32px rgba(160,60,0,.3);
        }
        body[data-deck="vedic"] .back-art { border-color: rgba(255,160,30,.3); }
        body[data-deck="vedic"] .back-art::before {
            width:58px; height:58px;
            border:2px solid rgba(255,160,30,.45);
            box-shadow:0 0 14px rgba(255,140,0,.4);
        }
        body[data-deck="vedic"] .back-art::after {
            width:36px; height:36px;
            border:1.5px solid rgba(255,215,80,.55);
            border-radius:0;          /* square — mandala inner frame */
            transform:translate(-50%,-50%) rotate(45deg);
        }
        body[data-deck="vedic"] .back-rune {
            font-size:1.5rem;
            filter:drop-shadow(0 0 10px rgba(255,170,30,1));
            animation:slow-spin 22s linear infinite;
        }
        /* Card front */
        body[data-deck="vedic"] .face-front {
            background: linear-gradient(155deg,#1e0900 0%,#3f1800 45%,#160700 100%);
        }
        body[data-deck="vedic"] .f-arcana   { color:rgba(255,160,30,.6); }
        body[data-deck="vedic"] .f-tarot-name { color:rgba(255,160,30,.8); }
        body[data-deck="vedic"] .f-tap        { color:rgba(255,160,30,.35); }
        body[data-deck="vedic"] .card-wrap.selected .face-back {
            border-color:#ffd700;
            box-shadow:0 0 32px rgba(255,210,0,.62), inset 0 0 32px rgba(160,60,0,.4);
        }

        /* ══════════════════════════════════════════════════
           TANTRIK DECK — Crimson yantra / fierce energy
           ══════════════════════════════════════════════════ */
        body[data-deck="tantrik"] {
            background: #0a0005;
            color: #ffc8de;
        }
        body[data-deck="tantrik"] .bg-glow {
            background: radial-gradient(ellipse, rgba(210,0,60,.08) 0%, rgba(120,0,70,.1) 40%, transparent 70%);
        }
        body[data-deck="tantrik"] .ring { border-color: rgba(210,0,60,.13); }
        /* Card back */
        body[data-deck="tantrik"] .face-back {
            background: linear-gradient(145deg,#1c0009 0%,#3e001a 55%,#110006 100%);
            border: 2px solid rgba(210,0,60,.55);
            box-shadow: 0 0 22px rgba(200,0,50,.2), inset 0 0 32px rgba(100,0,40,.34);
        }
        body[data-deck="tantrik"] .back-art {
            border-color: rgba(210,0,60,.3);
            border-radius: 0;              /* square yantra frame */
            transform: rotate(45deg);      /* diamond orientation */
        }
        body[data-deck="tantrik"] .back-rune {
            font-size:1.4rem;
            transform: rotate(-45deg);     /* keep rune upright */
            animation: tantrik-spin 9s linear infinite;
            filter:drop-shadow(0 0 10px rgba(220,0,70,1));
        }
        @keyframes tantrik-spin {
            from { transform: rotate(-45deg); }
            to   { transform: rotate(-45deg) rotate(360deg); }
        }
        body[data-deck="tantrik"] .back-art::before {
            width:52px; height:52px;
            border-radius:0;
            border:2px solid rgba(210,0,60,.48);
            box-shadow:0 0 14px rgba(200,0,55,.42);
            transform:translate(-50%,-50%) rotate(0deg);
        }
        body[data-deck="tantrik"] .back-art::after {
            width:32px; height:32px;
            border-radius:0;
            border:1.5px solid rgba(255,80,130,.55);
            transform:translate(-50%,-50%) rotate(45deg);
        }
        /* Card front */
        body[data-deck="tantrik"] .face-front {
            background: linear-gradient(155deg,#1c0009 0%,#3e001a 45%,#130006 100%);
        }
        body[data-deck="tantrik"] .f-arcana    { color:rgba(220,0,70,.6); }
        body[data-deck="tantrik"] .f-tarot-name { color:rgba(220,0,70,.82); }
        body[data-deck="tantrik"] .f-tap        { color:rgba(220,0,70,.35); }
        body[data-deck="tantrik"] .card-wrap.selected .face-back {
            border-color:#ff4499;
            box-shadow:0 0 32px rgba(255,50,150,.58), inset 0 0 32px rgba(100,0,40,.4);
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>
<div class="portal-rings">
    <div class="ring"></div><div class="ring"></div>
    <div class="ring"></div><div class="ring"></div><div class="ring"></div>
</div>
<canvas id="particles"></canvas>

<!-- Card Meaning Modal -->
<div class="card-modal" id="cardModal" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div id="modalContent"></div>
    </div>
</div>

<div class="container">
    <header>
        <span class="eye" id="headerEye">🔮</span>
        <h1 id="headerTitle">Mystic Arts Tarot</h1>
        <p class="subtitle" id="headerSubtitle">By the Vishanti &nbsp;&middot;&nbsp; A Dr. Strange Oracle</p>
        <div class="divider"></div>
    </header>

    <!-- Deck Selector -->
    <div class="deck-selector">
        <div class="deck-group">
            <button type="button" class="deck-btn deck-parent marvel-on open" id="btn-marvel-group" onclick="toggleMarvelMenu()">🔮 Marvel <i class="arrow">▼</i></button>
            <div class="deck-submenu open" id="marvel-submenu">
                <button type="button" class="deck-btn sub active" id="btn-mystic"    onclick="switchDeck('mystic')">✦ Mystic</button>
                <button type="button" class="deck-btn sub"        id="btn-avengers"  onclick="switchDeck('avengers')">🦸 Avengers</button>
                <button type="button" class="deck-btn sub"        id="btn-gods"      onclick="switchDeck('gods')">⚡ Gods</button>
            </div>
        </div>
        <button type="button" class="deck-btn" id="btn-vedic"   onclick="switchDeck('vedic')">🕉️ Vedic Gods</button>
        <button type="button" class="deck-btn" id="btn-tantrik" onclick="switchDeck('tantrik')">🔺 Tantrik</button>
    </div>

    <div class="deck-stats">
        <div class="stat">
            <div class="stat-num" id="revealed-count">0</div>
            <div class="stat-label">Revealed</div>

// ── State ────────────────────────────────────────────────────────────────────
let activeDeckName = 'mystic';
let DECK = MYSTIC_DECK;
let flipped  = [];
let selected = [];
const lastTap  = {};
const TAP_MS   = 320;

function initState() {
    flipped  = new Array(DECK.length).fill(false);
    selected = new Array(DECK.length).fill(false);
}
initState();

// ── Deck Switching ────────────────────────────────────────────────────────────
const MARVEL_DECKS = new Set(['mystic','avengers','gods']);

function toggleMarvelMenu() {
    document.getElementById('btn-marvel-group').classList.toggle('open');
    document.getElementById('marvel-submenu').classList.toggle('open');
}

function switchDeck(name) {
    if (name === activeDeckName) return;
    activeDeckName = name;
    const cfg = DECK_CONFIG[name];
    DECK = cfg.data;
    initState();
    closeModal();

    // Apply deck theme to body (mystic/avengers/gods share Marvel theme)
    if (MARVEL_DECKS.has(name)) document.body.removeAttribute('data-deck');
    else document.body.setAttribute('data-deck', name);

    // Update header
    document.getElementById('headerEye').textContent   = cfg.eye;
    document.getElementById('headerTitle').textContent  = cfg.title;
    document.getElementById('headerSubtitle').innerHTML = cfg.subtitle;

    // Update sub-button active state
    document.querySelectorAll('.deck-btn.sub').forEach(b => b.classList.remove('active'));
    const subBtn = document.getElementById('btn-' + name);
    if (subBtn) subBtn.classList.add('active');

    // Marvel parent button: highlight when any Marvel sub-deck active, open submenu
    const parentBtn = document.getElementById('btn-marvel-group');
    const submenu   = document.getElementById('marvel-submenu');
    if (MARVEL_DECKS.has(name)) {
        parentBtn.classList.add('marvel-on');
        parentBtn.classList.add('open');
        submenu.classList.add('open');
    } else {
        parentBtn.classList.remove('marvel-on');
        parentBtn.classList.remove('open');
        submenu.classList.remove('open');
    }

    // Update grid columns CSS variable based on deck size
    updateLayout();
    updateStats();
    renderGrid();
}

// ── Layout ────────────────────────────────────────────────────────────────────
function updateLayout() {
    const vw   = window.innerWidth;
    const n    = DECK.length;
    let cols;
    if      (vw >= 1400) cols = Math.min(n, 11);
    else if (vw >= 1100) cols = Math.min(n, 8);
    else if (vw >= 800)  cols = Math.min(n, 6);
    else if (vw >= 560)  cols = Math.min(n, 5);
    else                  cols = Math.min(n, 4);

    document.documentElement.style.setProperty('--grid-cols', cols);
    document.documentElement.style.setProperty('--card-w', '150px');
    document.documentElement.style.setProperty('--card-h', '255px');
}

// ── Interaction ──────────────────────────────────────────────────────────────
function handleCardClick(i) {
    if (flipped[i]) { showCardModal(i); return; }

    const now = Date.now();
    if (lastTap[i] && (now - lastTap[i]) < TAP_MS) {
        lastTap[i] = 0;
        revealCard(i);
    } else {
        lastTap[i] = now;
        toggleSelect(i);
    }
}

function toggleSelect(i) {
    if (flipped[i]) return;
    selected[i] = !selected[i];
    document.getElementById('wrap-' + i).classList.toggle('selected', selected[i]);
    updateStats();
}

function revealCard(i) {
    if (flipped[i]) return;
    flipped[i] = true; selected[i] = false;
    const cardEl = document.getElementById('card-' + i);
    const wrapEl = document.getElementById('wrap-' + i);
    cardEl.classList.add('flipped');
    wrapEl.classList.add('revealed');
    wrapEl.classList.remove('selected');
    updateStats();
    // Card is now flipped — user taps the revealed card to read meaning
}

function revealSelected() {
    let firstIdx = -1;
    selected.forEach((s, i) => {
        if (s && !flipped[i]) {
            if (firstIdx === -1) firstIdx = i;
            flipped[i] = true; selected[i] = false;
            const cardEl = document.getElementById('card-' + i);
            const wrapEl = document.getElementById('wrap-' + i);
            cardEl.classList.add('flipped');
            wrapEl.classList.add('revealed');
            wrapEl.classList.remove('selected');
        }
    });
    updateStats();
    // Cards are now flipped — user taps any revealed card to read meaning
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function showCardModal(i) {
    const card    = DECK[i];
    const cfg     = DECK_CONFIG[activeDeckName];
    const yn      = card.yesNo;
    const ynLabel = yn === 'yes' ? '✦ YES ✦' : yn === 'no' ? '✦ NO ✦' : '✦ MAYBE ✦';
    const subLine = cfg.modalSubFn(card);

    document.getElementById('modalContent').innerHTML = `
        <span class="modal-symbol" style="color:${card.color}">${card.symbol}</span>
        <div class="modal-title" style="color:${card.color}">${card.title}</div>
        <div class="modal-sub">${subLine}</div>
        <div class="modal-yesno">
            <span class="yesno-badge ${yn}">${ynLabel}</span>
        </div>
        <div class="modal-divider"></div>
        <div class="modal-section-label">What this card is telling you</div>
        <p class="modal-simple">${card.simple}</p>
        <button class="modal-deep-toggle" onclick="toggleDeep(this)">▸ See the deeper meaning</button>
        <p class="modal-deep">${card.meaning}</p>
        <div class="modal-keyword" style="color:${card.color}">✦ ${card.keyword} ✦</div>
    `;
    document.getElementById('cardModal').classList.add('open');
}

function toggleDeep(btn) {
    const deep = btn.nextElementSibling;
    deep.classList.toggle('open');
    btn.textContent = deep.classList.contains('open') ? '▾ Hide deeper meaning' : '▸ See the deeper meaning';
}

function closeModal() {
    document.getElementById('cardModal').classList.remove('open');
}

// ── View All Cards (flip in grid) ─────────────────────────────────────────────
function viewAllCards() {
    const indices = DECK.map((_, i) => i).filter(i => !flipped[i]);
    if (indices.length === 0) return;
    indices.forEach((i, idx) => {
        setTimeout(() => {
            flipped[i] = true; selected[i] = false;
            const cardEl = document.getElementById('card-' + i);
            const wrapEl = document.getElementById('wrap-' + i);
            if (cardEl) cardEl.classList.add('flipped');
            if (wrapEl) { wrapEl.classList.add('revealed'); wrapEl.classList.remove('selected'); }
        }, idx * 55);
    });
    setTimeout(() => updateStats(), indices.length * 55 + 100);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
    const rev      = flipped.filter(Boolean).length;
    const selCount = selected.filter((s, i) => s && !flipped[i]).length;
    document.getElementById('revealed-count').textContent = rev;
    document.getElementById('hidden-count').textContent   = DECK.length - rev;
    document.getElementById('revealBtn').style.display    = selCount > 0 ? 'inline-block' : 'none';
    document.getElementById('mainHint').textContent       = selCount > 0
        ? `${selCount} card${selCount > 1 ? 's' : ''} selected — double-tap to reveal`
        : 'Tap a card to select it · Double-tap to reveal its secret';
}

// ── Grid Render ───────────────────────────────────────────────────────────────
function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = DECK.map((card, i) => {
        const yn      = card.yesNo;
        const ynLabel = yn === 'yes' ? 'YES' : yn === 'no' ? 'NO' : 'MAYBE';
        return `
        <div class="card-wrap ${flipped[i]?'revealed':''} ${selected[i]?'selected':''}"
             id="wrap-${i}" onclick="handleCardClick(${i})">
            <div class="card ${flipped[i]?'flipped':''}" id="card-${i}">
                <div class="face face-back">
                    <div class="back-art"><span class="back-rune">${DECK_CONFIG[activeDeckName].rune}</span></div>
                </div>
                <div class="face face-front"
                     style="border-color:${card.color}55;
                            box-shadow:0 0 20px ${card.color}22,inset 0 0 24px rgba(100,0,200,.32);">
                    <div class="f-arcana">Card ${card.num}</div>
                    <div class="f-symbol" style="color:${card.color}">${card.symbol}</div>
                    <div class="f-tarot-name">${card.title}</div>
                    <div class="f-marvel-name">${card.character}</div>
                    <div class="f-line" style="background:linear-gradient(to right,transparent,${card.color}70,transparent)"></div>
                    <span class="f-yesno ${yn}">${ynLabel}</span>
                    <div class="f-keyword">${card.keyword}</div>
                    <div class="f-tap">tap to read</div>
                </div>
            </div>
        </div>`;
    }).join('');
}

// ── Deck Actions ──────────────────────────────────────────────────────────────
function resetAll() {
    initState();
    closeModal(); updateStats(); renderGrid();
}

function shuffleDeck() {
    initState();
    closeModal(); updateStats();

    const grid       = document.getElementById('grid');
    const shuffleBtn = document.getElementById('shuffleBtn');
    if (shuffleBtn) shuffleBtn.disabled = true;

    const gridRect = grid.getBoundingClientRect();
    const cx = gridRect.left + gridRect.width  / 2;
    const cy = gridRect.top  + gridRect.height / 2 + window.scrollY;

    // Phase 1 — cards fly into a centre pile
    const wraps = Array.from(grid.querySelectorAll('.card-wrap'));
    wraps.forEach((wrap, idx) => {
        const r   = wrap.getBoundingClientRect();
        const dx  = cx - (r.left + r.width  / 2);
        const dy  = (cy - window.scrollY) - (r.top  + r.height / 2);
        const rot = (Math.random() - 0.5) * 45;
        setTimeout(() => {
            wrap.style.transition = 'transform 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.32s ease';
            wrap.style.transform  = `translate(${dx}px,${dy}px) scale(0.48) rotate(${rot}deg)`;
            wrap.style.opacity    = '0.55';
            wrap.style.zIndex     = '50';
        }, idx * 22);
    });

    const gatherMs = wraps.length * 22 + 380;

    // Phase 2 — shuffle data, re-render, deal cards out
    setTimeout(() => {
        for (let i = DECK.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [DECK[i], DECK[j]] = [DECK[j], DECK[i]];
        }
        renderGrid();

        requestAnimationFrame(() => requestAnimationFrame(() => {
            const newWraps = Array.from(grid.querySelectorAll('.card-wrap'));

            // Set all cards to pile position instantly
            newWraps.forEach(wrap => {
                const r   = wrap.getBoundingClientRect();
                const dx  = cx - (r.left + r.width  / 2);
                const dy  = (cy - window.scrollY) - (r.top  + r.height / 2);
                const rot = (Math.random() - 0.5) * 55;
                wrap.style.transition = 'none';
                wrap.style.transform  = `translate(${dx}px,${dy}px) scale(0.35) rotate(${rot}deg)`;
                wrap.style.opacity    = '0';
            });

            // Deal each card out with stagger
            requestAnimationFrame(() => {
                newWraps.forEach((wrap, idx) => {
                    setTimeout(() => {
                        wrap.style.transition = `transform 0.52s cubic-bezier(0.175,0.885,0.32,1.275), opacity 0.38s ease`;
                        wrap.style.transform  = '';
                        wrap.style.opacity    = '';
                    }, idx * 38);
                });

                const cleanupMs = newWraps.length * 38 + 620;
                setTimeout(() => {
                    newWraps.forEach(w => { w.style.cssText = ''; });
                    if (shuffleBtn) shuffleBtn.disabled = false;
                }, cleanupMs);
            });
        }));
    }, gatherMs);
}

// ── Particles ─────────────────────────────────────────────────────────────────
(function(){
    const canvas = document.getElementById('particles');
    const ctx    = canvas.getContext('2d');
    const colors = ['#ff8c00','#ffd700','#c084fc','#ff6b00','#00aaff','#ff44ff'];
    let W, H, pts;

    function init() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        pts = Array.from({length:70}, () => ({
            x: Math.random()*W, y: Math.random()*H + H,
            r: Math.random()*1.8+0.4, speed: Math.random()*.5+.18,
            drift: (Math.random()-.5)*.4,
            color: colors[Math.floor(Math.random()*colors.length)],
            alpha: Math.random()*.5+.15
        }));
    }
    function loop() {
        ctx.clearRect(0,0,W,H);
        for (const p of pts) {
            p.y -= p.speed; p.x += p.drift;
            if (p.y < -10) { p.y = H+10; p.x = Math.random()*W; }
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle   = p.color;
            ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        requestAnimationFrame(loop);
    }
    window.addEventListener('resize', init);
    init(); loop();
})();

// ── Boot ──────────────────────────────────────────────────────────────────────
renderGrid();
updateStats();
updateLayout();
window.addEventListener('resize', updateLayout);
</script>
